name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Opcional (recomendado): falha o job se não existir o firebase.json
      - name: Verificar firebase.json
        run: test -f firebase.json

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUGB_EGOTEAM }}
          channelId: live
          projectId: pugb-egoteam
